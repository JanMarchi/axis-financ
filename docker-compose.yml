version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mepoupe-db
    environment:
      POSTGRES_USER: ${DB_USER:-mepoupe}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mepoupe_dev_pass}
      POSTGRES_DB: ${DB_NAME:-mepoupe_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mepoupe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mepoupe-network

  redis:
    image: redis:7-alpine
    container_name: mepoupe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mepoupe-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mepoupe-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-mepoupe}:${DB_PASSWORD:-mepoupe_dev_pass}@db:5432/${DB_NAME:-mepoupe_dev}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    networks:
      - mepoupe-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mepoupe-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
    networks:
      - mepoupe-network

volumes:
  postgres_data:
  redis_data:

networks:
  mepoupe-network:
    driver: bridge
